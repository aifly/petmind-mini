<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- 主渐变：珊瑚橙 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A76;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5733;stop-opacity:1" />
    </linearGradient>
    <!-- 背景卡片渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE8E0;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#FF7B54" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="40" y="40" width="320" height="320" rx="72" ry="72" fill="url(#bgGrad)" />

  <!-- 主爪印图标 -->
  <g transform="translate(200, 175)" filter="url(#shadow)">
    <!-- 大脚垫（主掌心） -->
    <ellipse cx="0" cy="28" rx="52" ry="44" fill="url(#mainGrad)" />

    <!-- 左上爪趾 -->
    <ellipse cx="-42" cy="-14" rx="20" ry="24" transform="rotate(-15, -42, -14)" fill="url(#mainGrad)" />
    <!-- 左中爪趾 -->
    <ellipse cx="-20" cy="-42" rx="18" ry="22" transform="rotate(-5, -20, -42)" fill="url(#mainGrad)" />
    <!-- 右中爪趾 -->
    <ellipse cx="20" cy="-42" rx="18" ry="22" transform="rotate(5, 20, -42)" fill="url(#mainGrad)" />
    <!-- 右上爪趾 -->
    <ellipse cx="42" cy="-14" rx="20" ry="24" transform="rotate(15, 42, -14)" fill="url(#mainGrad)" />

    <!-- 爱心（嵌在掌心，白色） -->
    <g transform="translate(0, 30)">
      <path d="M0,-12 C-3,-18 -14,-18 -14,-8 C-14,0 0,12 0,12 C0,12 14,0 14,-8 C14,-18 3,-18 0,-12 Z" fill="white" opacity="0.92" />
    </g>
  </g>

  <!-- 品牌文字 PetMind -->
  <text x="200" y="310" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="url(#mainGrad)" text-anchor="middle" letter-spacing="2">PetMind</text>

  <!-- 副标题 -->
  <text x="200" y="342" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#FF9A76" text-anchor="middle" letter-spacing="3" opacity="0.8">智能宠物管理</text>
</svg>
