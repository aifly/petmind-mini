<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetMind Logo 预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f8f9fa;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #FF7B54, #FF5733);
    color: white;
    padding: 24px 40px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 24px;
  }

  .section {
    margin-bottom: 48px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid #eee;
  }

  .preview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .preview-card {
    border-radius: 16px;
    padding: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    position: relative;
    overflow: hidden;
  }

  .preview-card.light { background: #ffffff; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .preview-card.warm { background: linear-gradient(135deg, #FFF5F2, #FFE8E0); box-shadow: 0 4px 24px rgba(255,123,84,0.12); }
  .preview-card.dark { background: #1a1a2e; }
  .preview-card.orange { background: linear-gradient(135deg, #FF7B54, #FF5733); }

  .preview-card .label {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 11px;
    color: #ccc;
    letter-spacing: 1px;
  }

  .preview-card.light .label,
  .preview-card.warm .label { color: #ccc; }
  .preview-card.dark .label,
  .preview-card.orange .label { color: rgba(255,255,255,0.4); }

  .size-row {
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
    padding: 32px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  .size-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .size-item span {
    font-size: 12px;
    color: #999;
    letter-spacing: 1px;
  }

  .horizontal-card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }

  .horizontal-dark {
    background: #1a1a2e;
  }

  /* SVG 在深色背景上的文字颜色反转 */
  .on-dark-note {
    font-size: 12px;
    color: #aaa;
    text-align: center;
    margin-top: 8px;
  }

  .color-chips {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding: 24px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 999px;
    border: 1px solid #eee;
    font-size: 13px;
    font-weight: 500;
  }

  .chip-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div class="header">🐾 PetMind — Logo 设计预览</div>

<div class="container">

  <!-- 方形 Logo -->
  <div class="section">
    <div class="section-title">方形 Logo（小程序 / App 图标）</div>
    <div class="preview-grid">
      <div class="preview-card light">
        <img src="logo.svg" width="200" height="200" alt="PetMind Logo">
        <span class="label">白色背景</span>
      </div>
      <div class="preview-card warm">
        <img src="logo.svg" width="200" height="200" alt="PetMind Logo">
        <span class="label">暖色背景</span>
      </div>
      <div class="preview-card dark">
        <img src="logo.svg" width="200" height="200" alt="PetMind Logo">
        <span class="label">深色背景</span>
      </div>
      <div class="preview-card orange">
        <img src="logo.svg" width="200" height="200" alt="PetMind Logo">
        <span class="label">品牌色背景</span>
      </div>
    </div>
  </div>

  <!-- 横版 Logo -->
  <div class="section">
    <div class="section-title">横版 Logo（网站 Header / 导航栏）</div>
    <div class="horizontal-card">
      <img src="logo-horizontal.svg" width="520" height="120" alt="PetMind Logo Horizontal">
    </div>
    <div class="horizontal-card horizontal-dark">
      <img src="logo-horizontal.svg" width="520" height="120" alt="PetMind Logo Horizontal Dark">
    </div>
    <p class="on-dark-note">深色模式建议使用白色文字版本（可按需调整）</p>
  </div>

  <!-- 尺寸展示 -->
  <div class="section">
    <div class="section-title">尺寸规范</div>
    <div class="size-row">
      <div class="size-item">
        <img src="logo.svg" width="96" height="96" alt="96px">
        <span>96×96</span>
      </div>
      <div class="size-item">
        <img src="logo.svg" width="64" height="64" alt="64px">
        <span>64×64</span>
      </div>
      <div class="size-item">
        <img src="logo.svg" width="48" height="48" alt="48px">
        <span>48×48</span>
      </div>
      <div class="size-item">
        <img src="logo.svg" width="32" height="32" alt="32px">
        <span>32×32</span>
      </div>
      <div class="size-item">
        <img src="logo.svg" width="24" height="24" alt="24px">
        <span>24×24</span>
      </div>
      <div class="size-item">
        <img src="logo.svg" width="16" height="16" alt="16px">
        <span>16×16</span>
      </div>
    </div>
  </div>

  <!-- 品牌色 -->
  <div class="section">
    <div class="section-title">Logo 品牌色板</div>
    <div class="color-chips">
      <div class="chip">
        <div class="chip-dot" style="background:#FF7B54"></div>
        珊瑚橙 #FF7B54 — 主品牌色
      </div>
      <div class="chip">
        <div class="chip-dot" style="background:#FF9A76"></div>
        浅珊瑚 #FF9A76 — 渐变起点
      </div>
      <div class="chip">
        <div class="chip-dot" style="background:#FF5733"></div>
        深珊瑚 #FF5733 — 渐变终点
      </div>
      <div class="chip">
        <div class="chip-dot" style="background:#FFF5F2;border:1px solid #eee"></div>
        奶白 #FFF5F2 — 背景色
      </div>
      <div class="chip">
        <div class="chip-dot" style="background:#FFE8E0;border:1px solid #eee"></div>
        浅橙 #FFE8E0 — 辅助背景
      </div>
    </div>
  </div>

</div>

</body>
</html>
